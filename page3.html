<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>튼튼탐험대 — 달 착륙!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'KyoboHand';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    :root { --title-font:'KyoboHand',sans-serif; --main-font:'Jua',sans-serif; }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      font-family:var(--main-font);
      background:#04061A;
    }

    .scene {
      width:100%; height:100dvh;
      position:relative;
      display:flex; flex-direction:column;
      align-items:center;
      overflow:hidden;
    }

    /* ── 별 ── */
    #star-canvas { position:absolute; inset:0; z-index:0; pointer-events:none; }

    /* ── 유성 ── */
    .shoot { position:absolute; width:80px; height:1.5px; background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,0.85)); border-radius:2px; left:-90px; z-index:1; pointer-events:none; }
    .sh1{top:5%; animation:sh 6s linear 2s infinite;}
    .sh2{top:12%;animation:sh 9s linear 7s infinite;}
    @keyframes sh{from{transform:translateX(0) rotate(18deg);opacity:1;}to{transform:translateX(120vw) rotate(18deg);opacity:0;}}

    /* ════════════════════════════
       메인 레이아웃: 위→아래 grid
    ════════════════════════════ */
    .layout {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      max-width: 430px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      /* 상단박스 | 행성구역 | 하단구역(달+버튼) */
      padding: 0 16px;
    }

    /* ── 1. 레벨 박스 ── */
    .level-box {
      margin-top: 3vh;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(200,220,255,0.22);
      border-radius: 16px; padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
      backdrop-filter: blur(6px);
      animation: fadeDown 0.5s ease both;
    }
    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
    .level-box-chars { display:flex; gap:6px; align-items:flex-end; }
    .lv-char { display:flex; flex-direction:column; align-items:center; gap:2px; opacity:0.28; transition:opacity 0.3s; }
    .lv-char.active { opacity:1; }
    .lv-emoji { font-size:20px; line-height:1; }
    .lv-char.active .lv-emoji { font-size:30px; animation:charBounce 2.5s ease-in-out infinite; filter:drop-shadow(0 0 8px rgba(255,220,100,0.7)); }
    @keyframes charBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    .lv-dot { width:4px; height:4px; border-radius:50%; background:rgba(200,216,255,0.2); margin-top:2px; }
    .lv-char.active .lv-dot { background:#FFD86E; box-shadow:0 0 5px rgba(255,216,110,0.6); }
    .level-box-info { flex:1; }
    .level-box-name  { font-family:var(--title-font); font-size:15px; color:#fff; line-height:1.2; }
    .level-box-stage { font-family:var(--main-font);  font-size:10px; color:rgba(200,220,255,0.6); margin-top:2px; }
    .level-box-badge { background:rgba(255,216,110,0.15); border:1px solid rgba(255,216,110,0.35); color:#FFD86E; font-size:9px; padding:1px 8px; border-radius:100px; margin-top:4px; display:inline-block; }

    /* ── 2. 행성 구역 ── */
    .planet-area {
      position: relative;
      width: 100%;
    }

    /* 공통 행성 스타일 */
    .planet-wrap {
      position: absolute;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
    }
    .planet-body {
      border-radius: 50%; position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 3px;
      overflow: visible;
    }

    /* 크기 */
    .p-xs  { width:42px;  height:42px;  }   /* 왼쪽 장식 작은 */
    .p-sm  { width:55px;  height:55px;  }   /* 오른쪽 장식 */
    .p-md  { width:105px; height:105px; }   /* 신청서 */
    .p-lg  { width:145px; height:145px; }   /* 오늘의 미션 */

    /* ── 위치 (스케치 기준) ── */
    /* 오른쪽 중상단 — 오늘의 미션 */
    .pos-mission { top:2%;  right:0%; }
    /* 왼쪽 중단 — 신청서 */
    .pos-apply   { top:42%; left:2%; }
    /* 두 행성 사이 — 파란 장식 (신청서보다 아래) */
    .pos-deco-mid { top:78%; left:50%; transform:translateX(-50%); }

    /* ── 파스텔 행성 색상 ── */
    /* 미션 — 민트 */
    .planet-mission {
      background: radial-gradient(circle at 32% 28%, #C8F5E8 0%, #8ADEC4 30%, #5EC4A8 60%, #2E8A72 100%);
      box-shadow: 0 0 0 2px rgba(140,222,196,0.2), 0 0 28px rgba(94,196,168,0.6), 0 0 55px rgba(94,196,168,0.18), inset -18px -14px 0 rgba(10,40,30,0.3);
      animation: floatB 4.5s ease-in-out infinite;
    }
    /* 신청서 — 라벤더 */
    .planet-apply {
      background: radial-gradient(circle at 32% 28%, #E8DDFF 0%, #B8A4F0 30%, #8B74D4 60%, #5A4A9A 100%);
      box-shadow: 0 0 0 2px rgba(180,160,240,0.2), 0 0 22px rgba(140,116,212,0.6), 0 0 44px rgba(140,116,212,0.18), inset -12px -10px 0 rgba(30,15,60,0.3);
      animation: floatA 4s ease-in-out 0.5s infinite;
    }
    /* 장식1 — 산호 */
    .planet-coral {
      background: radial-gradient(circle at 32% 28%, #FFCFC0 0%, #F4956E 40%, #C45A38 80%, #6A2510 100%);
      box-shadow: 0 0 12px rgba(244,149,110,0.55), inset -5px -4px 0 rgba(50,10,0,0.3);
      animation: floatA 5s ease-in-out 1s infinite;
    }
    /* 장식2 — 하늘색 */
    .planet-sky {
      background: radial-gradient(circle at 32% 28%, #C8EEFF 0%, #80CCEE 35%, #3A9ACC 65%, #14527A 100%);
      box-shadow: 0 0 14px rgba(128,204,238,0.55), inset -7px -5px 0 rgba(5,20,40,0.32);
      animation: floatB 6s ease-in-out 2s infinite;
    }

    .planet-wrap:active .planet-body { transform: scale(0.93); }
    @keyframes floatA{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    @keyframes floatB{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

    /* ── 토성 고리 ── */
    .ring-back, .ring-front, .ring-back2, .ring-front2 {
      position:absolute; border-radius:50%; top:50%; left:50%; pointer-events:none;
    }
    /* 미션 고리 */
    .planet-mission .ring-back  {width:280px;height:50px;border:18px solid transparent;border-top:18px solid rgba(140,220,195,0.55);transform:translate(-50%,-50%) rotateX(70deg);z-index:1;}
    .planet-mission .ring-front {width:280px;height:50px;border:18px solid transparent;border-bottom:18px solid rgba(140,220,195,0.85);transform:translate(-50%,-50%) rotateX(70deg);z-index:3;box-shadow:0 4px 12px rgba(94,196,168,0.3);}
    .planet-mission .ring-back2 {width:240px;height:38px;border:8px solid transparent;border-top:8px solid rgba(180,245,225,0.35);transform:translate(-50%,-50%) rotateX(70deg);z-index:1;}
    .planet-mission .ring-front2{width:240px;height:38px;border:8px solid transparent;border-bottom:8px solid rgba(180,245,225,0.6);transform:translate(-50%,-50%) rotateX(70deg);z-index:3;}
    /* 신청서 고리 */
    .planet-apply .ring-back  {width:220px;height:38px;border:16px solid transparent;border-top:16px solid rgba(180,155,240,0.2);transform:translate(-50%,-50%) rotate(35deg) rotateX(60deg);z-index:1;}
    .planet-apply .ring-front {width:220px;height:38px;border:16px solid transparent;border-bottom:16px solid rgba(180,155,240,0.35);transform:translate(-50%,-50%) rotate(35deg) rotateX(60deg);z-index:3;box-shadow:0 4px 12px rgba(140,116,212,0.15);}
    .planet-apply .ring-back2 {width:188px;height:28px;border:7px solid transparent;border-top:7px solid rgba(210,190,255,0.12);transform:translate(-50%,-50%) rotate(35deg) rotateX(60deg);z-index:1;}
    .planet-apply .ring-front2{width:188px;height:28px;border:7px solid transparent;border-bottom:7px solid rgba(210,190,255,0.22);transform:translate(-50%,-50%) rotate(35deg) rotateX(60deg);z-index:3;}
    /* 산호 고리 */
    .planet-coral .ring-back  {width:64px;height:11px;border:4px solid transparent;border-top:4px solid rgba(255,190,160,0.35);transform:translate(-50%,-50%) rotateX(70deg);z-index:1;}
    .planet-coral .ring-front {width:64px;height:11px;border:4px solid transparent;border-bottom:4px solid rgba(255,190,160,0.5);transform:translate(-50%,-50%) rotateX(70deg);z-index:3;}

    /* 하늘색 고리 */
    .planet-sky .ring-back  {width:88px;height:16px;border:6px solid transparent;border-top:6px solid rgba(140,210,248,0.25);transform:translate(-50%,-50%) rotateX(70deg);z-index:1;}
    .planet-sky .ring-front {width:88px;height:16px;border:6px solid transparent;border-bottom:6px solid rgba(140,210,248,0.5);transform:translate(-50%,-50%) rotateX(70deg);z-index:3;}
    .planet-sky .ring-back2 {width:74px;height:12px;border:3px solid transparent;border-top:3px solid rgba(170,225,255,0.15);transform:translate(-50%,-50%) rotateX(70deg);z-index:1;}
    .planet-sky .ring-front2{width:74px;height:12px;border:3px solid transparent;border-bottom:3px solid rgba(170,225,255,0.32);transform:translate(-50%,-50%) rotateX(70deg);z-index:3;}
    .planet-band {position:absolute;width:80%;height:14%;border-radius:50%;top:30%;pointer-events:none;z-index:2;}
    .planet-mission .planet-band {background:rgba(190,245,225,0.14);}
    .planet-apply   .planet-band {background:rgba(230,210,255,0.14);}

    .p-icon-md{font-size:32px;position:relative;z-index:2;line-height:1;}
    .p-icon-lg{font-size:44px;position:relative;z-index:2;line-height:1;}
    .p-label  {font-family:var(--main-font);font-size:16px;font-weight:900;color:#fff;position:relative;z-index:2;text-shadow:0 0 8px rgba(0,0,0,1), 0 2px 4px rgba(0,0,0,1), 0 0 16px rgba(0,0,0,0.8);letter-spacing:0.5px;}

    /* ── 달 표면 (가로 화면 꽉) ── */
    .moon-surface {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160vw;
      height: 32vh;
      z-index: 2; pointer-events: none;
    }

    /* ── 3. 하단 구역 ── */
    .bottom-zone {
      position: relative;
      width: 100%;
      height: 32vh;
      flex-shrink: 0;
    }

    /* 대박선물 박스 — 오른쪽 */
    .gift-box {
      position: absolute;
      right: 0; top: 10%;
      background: rgba(255,200,60,0.18);
      border: 2px solid rgba(255,210,80,0.5);
      border-radius: 14px;
      padding: 12px 18px;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer;
      transition: transform 0.15s;
      backdrop-filter: blur(8px);
      z-index: 10;
      animation: giftPulse 2s ease-in-out infinite;
    }
    .gift-box:active { transform: scale(0.95); }
    @keyframes giftPulse{0%,100%{box-shadow:0 0 0 rgba(255,210,80,0);}50%{box-shadow:0 0 16px rgba(255,210,80,0.4);}}
    .gift-icon-big { font-size:30px; animation:wiggle 2s ease-in-out infinite; display:inline-block; }
    @keyframes wiggle{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
    .gift-title {
      font-family: var(--title-font);
      font-size: 16px; color: #1a1a1a;
      text-shadow: none;
      white-space: nowrap;
    }
    .gift-sub {
      font-family: var(--main-font);
      font-size: 11px; color: #333;
      text-shadow: none;
      white-space: nowrap;
    }
    .gift-arrow { font-size:16px; animation:bDown 1s ease-in-out infinite; }
    @keyframes bDown{0%,100%{transform:translateY(0);}50%{transform:translateY(3px);}}

    /* 달 위 텍스트 */
    .moon-label {
      position: absolute;
      left: 10%; bottom: 38%;
      font-family: var(--main-font);
      font-size: 12px; color: rgba(200,220,255,0.5);
      z-index: 10;
    }

    /* ── 네비 — 달 안쪽 하단 ── */
    .nav-row {
      position: absolute;
      bottom: max(10px, env(safe-area-inset-bottom));
      left: 0; right: 0;
      display: flex; gap: 12px;
      padding: 0 16px;
      z-index: 15;
    }
    .nav-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px; padding: 10px 0;
      font-family: var(--main-font); font-size: 14px; color: #fff;
      cursor: pointer; transition: transform 0.15s;
    }
    .nav-btn:active{transform:scale(0.95);}
    .nav-btn.prev{background:rgba(255,255,255,0.1);}
    .nav-btn.next{background:rgba(29,158,117,0.4);border-color:rgba(93,202,165,0.5);}

    .page-out{animation:pageOut 0.4s ease forwards!important;}
    @keyframes pageOut{to{opacity:0;transform:translateY(-14px);}}
  </style>
</head>
<body>
<div class="scene">

  <canvas id="star-canvas"></canvas>
  <div class="shoot sh1"></div>
  <div class="shoot sh2"></div>

  <!-- 달 표면 (씬에 fixed) -->
  <svg class="moon-surface" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
    <defs>
      <radialGradient id="moonGrad" cx="50%" cy="5%" r="95%">
        <stop offset="0%"  stop-color="#BDD0E8"/>
        <stop offset="28%" stop-color="#8A9FB8"/>
        <stop offset="62%" stop-color="#5C6E88"/>
        <stop offset="100%"stop-color="#30404E"/>
      </radialGradient>
      <radialGradient id="cg1" cx="38%" cy="32%" r="62%">
        <stop offset="0%"  stop-color="rgba(20,30,52,0.85)"/>
        <stop offset="100%"stop-color="rgba(32,46,72,0)"/>
      </radialGradient>
      <radialGradient id="cg2" cx="38%" cy="32%" r="62%">
        <stop offset="0%"  stop-color="rgba(16,26,48,0.72)"/>
        <stop offset="100%"stop-color="rgba(16,26,48,0)"/>
      </radialGradient>
      <filter id="roughEdge" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="turbulence" baseFrequency="0.02 0.04" numOctaves="4" seed="11"/>
        <feDisplacementMap in="SourceGraphic" scale="10" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="tb"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <!-- 크고 둥근 달 본체 — ellipse cy를 높게 잡아서 상단이 완만한 곡선으로 보임 -->
    <ellipse cx="400" cy="500" rx="780" ry="460" fill="url(#moonGrad)" filter="url(#roughEdge)"/>
    <!-- 크레이터 -->
    <ellipse cx="140" cy="270" rx="55" ry="20" fill="rgba(36,48,70,0.52)" filter="url(#tb)" transform="rotate(-6,140,270)"/>
    <ellipse cx="110" cy="252" rx="42" ry="16" fill="url(#cg1)"/>
    <ellipse cx="110" cy="244" rx="42" ry="10" fill="none" stroke="rgba(180,196,220,0.5)" stroke-width="2"/>
    <ellipse cx="580" cy="255" rx="36" ry="13" fill="url(#cg1)"/>
    <ellipse cx="580" cy="248" rx="36" ry="9"  fill="none" stroke="rgba(172,188,214,0.45)" stroke-width="1.8"/>
    <ellipse cx="320" cy="290" rx="22" ry="8"  fill="url(#cg2)"/>
    <circle  cx="200" cy="285" r="4"   fill="rgba(20,32,55,0.55)"/>
    <circle  cx="490" cy="278" r="3"   fill="rgba(20,32,55,0.48)"/>
  </svg>

  <!-- 메인 레이아웃 -->
  <div class="layout">

    <!-- ① 레벨 박스 -->
    <div class="level-box">
      <div class="level-box-chars">
        <div class="lv-char" id="lv0"><span class="lv-emoji">🐱</span><div class="lv-dot"></div></div>
        <div class="lv-char" id="lv1"><span class="lv-emoji">🐵</span><div class="lv-dot"></div></div>
        <div class="lv-char" id="lv2"><span class="lv-emoji">🐶</span><div class="lv-dot"></div></div>
        <div class="lv-char" id="lv3"><span class="lv-emoji">🐯</span><div class="lv-dot"></div></div>
      </div>
      <div class="level-box-info">
        <div class="level-box-name"  id="level-name">🐱 초보 냥이</div>
        <div class="level-box-stage" id="level-stage">1단계 · 0~200P</div>
        <div class="level-box-badge">진행 중! ⭐</div>
      </div>
    </div>

    <!-- ② 행성 구역 -->
    <div class="planet-area">

      <!-- 오른쪽 중상단 — 오늘의 미션 (큰) -->
      <div class="planet-wrap pos-mission" onclick="goMission()">
        <div class="planet-body p-lg planet-mission">
          <div class="ring-back"></div><div class="ring-back2"></div>
          <div class="planet-glint"></div><div class="planet-band"></div>
          <span class="p-icon-lg">🚀</span>
          <span class="p-label">오늘의 미션</span>
          <div class="ring-front2"></div><div class="ring-front"></div>
        </div>
      </div>

      <!-- 왼쪽 중단 — 신청서 (중간) -->
      <a href="https://docs.google.com/forms/d/10Hd0DfOwFndrI78kb3JqTVuPSH6wFnBUkieXcYyQ_e4/viewform"
         target="_blank" class="planet-wrap pos-apply" style="text-decoration:none;">
        <div class="planet-body p-md planet-apply">
          <div class="ring-back"></div><div class="ring-back2"></div>
          <div class="planet-glint"></div><div class="planet-band"></div>
          <span class="p-icon-md">📋</span>
          <span class="p-label">신청서</span>
          <div class="ring-front2"></div><div class="ring-front"></div>
        </div>
      </a>

      <!-- 두 행성 사이 — 파란 장식 -->
      <div class="planet-wrap pos-deco-mid">
        <div class="planet-body p-sm planet-sky">
          <div class="ring-back"></div>
          <div class="ring-back2"></div>
          <div class="planet-glint"></div>
          <div class="ring-front2"></div>
          <div class="ring-front"></div>
        </div>
      </div>

    </div><!-- /.planet-area -->

    <!-- ③ 하단 구역: 달 + 대박선물 + 버튼 -->
    <div class="bottom-zone">
      <div class="moon-label">🌙 달</div>

      <!-- 대박선물 박스 -->
      <div class="gift-box" onclick="goNext()">
        <span class="gift-icon-big">🎁</span>
        <div class="gift-title">대박선물 2탄!</div>
        <div class="gift-sub">누르면 확인할 수 있어요</div>
        <span class="gift-arrow">👇</span>
      </div>

      <!-- 이전/다음 버튼 — 달 안쪽 -->
      <div class="nav-row">
        <button class="nav-btn prev" onclick="goPrev()">← 이전</button>
        <button class="nav-btn next" onclick="goNext()">다음 →</button>
      </div>
    </div>

  </div><!-- /.layout -->

</div><!-- /.scene -->

<script>
(function(){
  var c=document.getElementById('star-canvas'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;draw();}
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<180;i++){
      var x=Math.random()*c.width, y=Math.random()*c.height;
      var r=Math.random()*1.5+0.2, a=Math.random()*0.75+0.2;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill();
    }
  }
  window.addEventListener('resize',resize); resize();
})();

var LEVELS=[
  {emoji:'🐱',name:'초보 냥이',                   stage:'1단계 · 0~200P'},
  {emoji:'🐵',name:'재간둥이 원숭이',              stage:'2단계 · 201~600P'},
  {emoji:'🐶',name:'지구수호대 멍멍이',            stage:'3단계 · 601~1200P'},
  {emoji:'🐯',name:'우주를 누비는 무적의 호랑이',  stage:'4단계 · 1201P~'}
];
var curLv=0;
try{
  var pts=parseInt(localStorage.getItem('tuntun_pts')||'0');
  if(pts<=200)curLv=0;else if(pts<=600)curLv=1;else if(pts<=1200)curLv=2;else curLv=3;
}catch(e){}

function renderLevel(){
  for(var i=0;i<4;i++) document.getElementById('lv'+i).classList.toggle('active',i===curLv);
  document.getElementById('level-name').textContent =LEVELS[curLv].emoji+' '+LEVELS[curLv].name;
  document.getElementById('level-stage').textContent=LEVELS[curLv].stage;
}
renderLevel();

function goPrev()   {document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='levelup.html';},400);}
function goMission(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page4.html'; },400);}
function goNext()   {document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page4.html'; },400);}

var lt=0;
document.addEventListener('touchend',function(e){var n=Date.now();if(n-lt<300)e.preventDefault();lt=n;},{passive:false});
</script>
</body>
</html>
